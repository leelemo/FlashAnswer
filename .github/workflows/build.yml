name: Build FlashAnswer iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: List available schemes
        run: xcodebuild -project FlashAnswer.xcodeproj -list

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer

      - name: Build for simulator (syntax check)
        run: |
          xcodebuild build \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Build BroadcastExtension (Release)
        run: |
          xcodebuild build \
            -project FlashAnswer.xcodeproj \
            -target BroadcastExtension \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Archive FlashAnswer (unsigned, for AltStore sideloading)
        run: |
          xcodebuild archive \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FlashAnswer.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Export .ipa (embed BroadcastExtension + pack Payload)
        run: |
          # 调试：列出 DerivedData 中所有 .appex
          echo "=== 搜索 BroadcastExtension.appex ==="
          find ~/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" 2>/dev/null || echo "NOT FOUND in DerivedData"
          echo "=== 搜索所有 .appex ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.appex" 2>/dev/null | head -10 || echo "NO .appex files found"
          echo "=== DerivedData 目录列表 ==="
          ls ~/Library/Developer/Xcode/DerivedData/ 2>/dev/null | head -10 || echo "DerivedData empty"
          echo "================================"

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          APP_PATH=$(find "$RUNNER_TEMP/FlashAnswer.xcarchive/Products" -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"

          # 嵌入 BroadcastExtension
          EXTENSION_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" | head -1)
          if [ -n "$EXTENSION_PATH" ]; then
            echo "Found extension at: $EXTENSION_PATH"
            mkdir -p "$RUNNER_TEMP/ipa/Payload/FlashAnswer.app/PlugIns"
            cp -r "$EXTENSION_PATH" "$RUNNER_TEMP/ipa/Payload/FlashAnswer.app/PlugIns/"
            echo "BroadcastExtension embedded successfully"
          else
            echo "WARNING: BroadcastExtension.appex not found - continuing without it"
          fi

          cd "$RUNNER_TEMP/ipa"
          find Payload -name "*.appex" -o -name "*.app" 2>/dev/null | head -20
          zip -r FlashAnswer.ipa Payload
          echo "IPA size: $(du -sh FlashAnswer.ipa)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashAnswer-ipa
          path: ${{ runner.temp }}/ipa/FlashAnswer.ipa
          retention-days: 30

      - name: Upload .xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashAnswer-xcarchive
          path: ${{ runner.temp }}/FlashAnswer.xcarchive
          retention-days: 7
