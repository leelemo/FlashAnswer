name: Build FlashAnswer iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: List available schemes
        run: xcodebuild -project FlashAnswer.xcodeproj -list

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer

      - name: Build for simulator (syntax check)
        run: |
          xcodebuild build \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Build BroadcastExtension (Release)
        run: |
          xcodebuild build \
            -project FlashAnswer.xcodeproj \
            -target BroadcastExtension \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Archive FlashAnswer (unsigned, for AltStore sideloading)
        run: |
          xcodebuild archive \
            -project FlashAnswer.xcodeproj \
            -scheme FlashAnswer \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FlashAnswer.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Export .ipa (embed BroadcastExtension + pack Payload)
        run: |
          set -e
          echo "=== 1. BroadcastExtension TARGET_BUILD_DIR ==="
          BUILD_DIR=$(xcodebuild \
            -project FlashAnswer.xcodeproj \
            -target BroadcastExtension \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings 2>/dev/null \
            | grep "TARGET_BUILD_DIR" \
            | head -1 \
            | awk '{$1=""; $2=""; print $0}' \
            | sed 's/^ *//')
          echo "TARGET_BUILD_DIR=$BUILD_DIR"
          if [ -d "$BUILD_DIR" ]; then
            ls -la "$BUILD_DIR"/*.appex 2>/dev/null || echo "No .appex in build dir"
          fi

          echo "=== 2. 从 xcarchive 复制 .app ==="
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          APP_PATH=$(find "$RUNNER_TEMP/FlashAnswer.xcarchive/Products" -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          # -L 解引用符号链接，避免 IPA 内残留符号链接导致爱思助手“压缩ipa出错”
          cp -rL "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"

          echo "=== 3. 查找并嵌入 BroadcastExtension ==="
          # 优先从 TARGET_BUILD_DIR 找
          EXTENSION_PATH=""
          if [ -d "$BUILD_DIR" ]; then
            EXTENSION_PATH=$(find "$BUILD_DIR" -name "BroadcastExtension.appex" 2>/dev/null | head -1)
          fi
          # 如果没找到，搜索 DerivedData
          if [ -z "$EXTENSION_PATH" ]; then
            EXTENSION_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" 2>/dev/null | head -1)
          fi
          # 搜索所有可能位置
          if [ -z "$EXTENSION_PATH" ]; then
            EXTENSION_PATH=$(find / -name "BroadcastExtension.appex" -not -path "*/\.*" 2>/dev/null | head -1)
          fi

          if [ -n "$EXTENSION_PATH" ]; then
            echo "Found extension at: $EXTENSION_PATH"
            mkdir -p "$RUNNER_TEMP/ipa/Payload/FlashAnswer.app/PlugIns"
            # -L 同样解引用符号链接
            cp -rL "$EXTENSION_PATH" "$RUNNER_TEMP/ipa/Payload/FlashAnswer.app/PlugIns/"
            echo "BroadcastExtension embedded successfully"
            ls -la "$RUNNER_TEMP/ipa/Payload/FlashAnswer.app/PlugIns/"
          else
            echo "WARNING: BroadcastExtension.appex not found anywhere!"
            echo "BroadcastExtension 未嵌入 IPA — 需要先修复编译步骤"
          fi

          echo "=== 4. 打包 IPA（解引用符号链接，兼容爱思助手签名）==="
          cd "$RUNNER_TEMP/ipa"
          echo "--- 列出 Payload 内容 ---"
          find Payload -name "*.appex" -o -name "*.app" 2>/dev/null | head -20
          echo "--- 检查是否仍有符号链接（爱思助手无法处理符号链接）---"
          SYMLINKS=$(find Payload -type l)
          if [ -n "$SYMLINKS" ]; then
            echo "警告：仍发现符号链接："
            echo "$SYMLINKS"
          else
            echo "OK：Payload 内无符号链接。"
          fi
          # 用 ditto 打包：解引用符号链接、生成 Windows/爱思 兼容的 zip
          rm -f FlashAnswer.ipa
          ditto -c -k --sequesterRsrc --keepParent Payload FlashAnswer.ipa
          echo "IPA size: $(du -sh FlashAnswer.ipa)"
          echo "--- 校验 IPA 结构 ---"
          unzip -l FlashAnswer.ipa | grep -E "PlugIns/BroadcastExtension.appex|Payload/FlashAnswer.app/$" | head -5

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashAnswer-ipa
          path: ${{ runner.temp }}/ipa/FlashAnswer.ipa
          retention-days: 30

      - name: Upload .xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashAnswer-xcarchive
          path: ${{ runner.temp }}/FlashAnswer.xcarchive
          retention-days: 7
